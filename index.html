<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRS 점집</title>
    <style>
        /* 레트로 픽셀 폰트 (둥근모꼴) 불러오기 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DungGeunMo', monospace;
        }

        body {
            background-color: #0d0e15;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* 도트 배경 패턴 */
            background-image: 
                linear-gradient(rgba(13, 14, 21, 0.9) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13, 14, 21, 0.9) 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* 옛날 브라운관 모니터(CRT) 스캔라인 효과 */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* 아케이드 게임 박스 컨테이너 */
        .container {
            background-color: #000;
            border: 6px solid #fff;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 0 20px rgba(57, 255, 20, 0.4),
                inset 0 0 20px rgba(57, 255, 20, 0.4);
            border-image: linear-gradient(to right, #39ff14, #0ff) 1;
        }

        h1 {
            font-size: 48px;
            color: #39ff14; /* 네온 그린 */
            text-shadow: 3px 3px 0px #005f00;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 18px;
            color: #fff;
            margin-bottom: 40px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        /* 게임 버튼 디자인 */
        .btn {
            background-color: #39ff14;
            color: #000;
            border: 4px solid #fff;
            padding: 15px 30px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #fff;
            color: #000;
            border-color: #39ff14;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 결과 화면 (초기엔 숨김) */
        #result-view {
            display: none;
        }

        .result-box {
            border: 4px dashed #39ff14;
            padding: 20px;
            margin: 20px 0;
            background: rgba(57, 255, 20, 0.1);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fortune-text {
            font-size: 22px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .lucky-items {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .lucky-item {
            background: #222;
            border: 2px solid #fff;
            padding: 15px;
            width: 45%;
        }

        .lucky-item span {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .lucky-item strong {
            font-size: 20px;
        }

        /* 로딩 화면 (초기엔 숨김) */
        #loading {
            display: none;
            font-size: 24px;
            color: #ff00ff;
            margin: 40px 0;
            animation: blink 0.5s infinite;
        }

    </style>
</head>

        function startFortune() {
            // 버튼 클릭 시 로딩 화면으로 전환
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // 레트로 감성을 위해 1.5초간 '계산 중' 연출 후 결과 표시
            setTimeout(() => {
                showResult();
            }, 1500);
        }

        function showResult() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';

            // 100개 중 랜덤으로 1개 선택
            const randomIndex = Math.floor(Math.random() * fortunes.length);
            const selected = fortunes[randomIndex];

            const textElement = document.getElementById('fortune-text');
            textElement.innerHTML = '';
            
            // 행운의 아이템 데이터 삽입
            document.getElementById('lucky-color').innerText = selected.color;
            document.getElementById('lucky-food').innerText = selected.food;

            // 게임 텍스트처럼 한 글자씩 나오는 타이핑 애니메이션
            let i = 0;
            const text = selected.fortune;
            const typingInterval = setInterval(() => {
                textElement.innerHTML += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(typingInterval);
                }
            }, 50); // 글자 출력 속도 (50ms)
        }

        function resetGame() {
            // 다시 초기 화면으로
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }
